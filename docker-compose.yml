services:
  litellm:
    image: litellm/litellm:v1.82.3
    container_name: litellm-proxy
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - ./litellm/auth:/root/.config/litellm
    env_file:
      - ./litellm/.env
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
